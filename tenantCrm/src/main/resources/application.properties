spring.application.name=tenantCrm
 
server.port=9090
 
spring.datasource.url=jdbc:mysql://localhost:3306/crm?createDatabaseIfNotExist=true
 
spring.datasource.username=root
 
spring.datasource.password=Root@12345

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false

spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=OFF

logging.level.org.hibernate.type.descriptor.sql=OFF
 
spring.sql.init.mode=always

spring.jpa.defer-datasource-initialization=true

# ── JWT ──────────────────────────────────────────────────────────────────────
# 256-bit (32-byte) Base64-encoded secret — change this in production
app.jwt.secret=Y3JtU2VjcmV0S2V5Rm9yVGVuYW50Q3JtQXBwbGljYXRpb24yMDI2
# Token validity: 8 hours in milliseconds
app.jwt.expiration-ms=28800000

# ── Disable JSESSIONID completely ────────────────────────────────────────────
# Only allow cookie-based session tracking (disables URL rewriting of jsessionid)
server.servlet.session.tracking-modes=cookie
# Set session timeout to minimum — sessions are never used anyway (JWT is stateless)
server.servlet.session.timeout=1s


#######################################################SMTP MAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Customizable Security API Paths ──────────────────────────────────────────
app.security.holidays-api-path=/api/holidays/**
app.security.notifications-api-path=/api/notifications/**

# ── Super Admin Default Credentials ──────────────────────────────────────────
app.security.superadmin.default-password=${SUPERADMIN_PASSWORD:superadmin123}