<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager — My Team</title>
    <link rel="stylesheet" th:href="@{/manager.css}">
</head>
<body>
<div class="mobile-topbar"><button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button><span class="mobile-title">&#128202; Manager</span></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">&#128202;</div><h2>Manager</h2></div>
    <div class="profile-box">
        <div class="profile-avatar" th:text="${#strings.substring(managerName ?: 'M', 0, 1).toUpperCase()}">M</div>
        <h3 th:text="${managerName} ?: 'Manager'">Manager</h3><p>Manager</p>
    </div>
    <ul class="sidebar-menu">
        <li><a th:href="@{/manager/dashboard}">&#128202; Dashboard</a></li>
        <li class="active"><a th:href="@{/manager/team}">&#128101; My Team</a></li>
        <li><a th:href="@{/manager/projects}">&#128193; Projects</a></li>
        <li><a th:href="@{/manager/tasks}">&#9989; Tasks</a></li>
        <li><a th:href="@{/manager/reports}">&#128196; Reports</a></li>
        <li><a th:href="@{/manager/settings}">&#9881; Settings</a></li>
    </ul>
    <a href="#" data-logout style="text-decoration:none;"><button class="logout-btn">&#128682; Logout</button></a>
</div>
<div class="main-wrapper">
    <div class="topbar">
        <h1>My Team</h1>
        <div class="topbar-right">
            <div class="search-box"><input type="text" id="globalSearch" placeholder="Search team…"></div>
            <div class="user-badge" th:text="${#strings.substring(managerName ?: 'M', 0, 1).toUpperCase()}">M</div>
        </div>
    </div>
    <div class="page-content">
        <div class="stats-row" style="grid-template-columns:repeat(3,1fr);">
            <div class="stat-card"><div class="stat-icon purple">&#128101;</div><div class="stat-info"><h3 th:text="${teamCount} ?: '0'">0</h3><p>Total Members</p></div></div>
            <div class="stat-card"><div class="stat-icon green">&#9989;</div><div class="stat-info"><h3 th:text="${activeTeam} ?: '0'">0</h3><p>Active</p></div></div>
            <div class="stat-card"><div class="stat-icon orange">&#128100;</div><div class="stat-info"><h3 th:text="${inactiveTeam} ?: '0'">0</h3><p>Inactive</p></div></div>
        </div>
        <div class="card">
            <div class="card-header"><div><h2>Team Members</h2><p th:text="${teamCount} + ' member(s)'">0 member(s)</p></div></div>
            <div class="table-wrap">
                <table id="teamTable">
                    <thead><tr><th>#</th><th>Member</th><th>Email</th><th>Role</th><th>Status</th></tr></thead>
                    <tbody>
                        <tr th:each="member, stat : ${teamMembers}">
                            <td th:text="${stat.count}">1</td>
                            <td><div class="member-cell"><div class="member-avatar" th:text="${#strings.substring(member.username ?: 'M', 0, 1).toUpperCase()}">M</div><span style="font-weight:600;" th:text="${member.username}">Member</span></div></td>
                            <td style="color:#6b7280;font-size:13px;" th:text="${member.email}">email</td>
                            <td><span class="role-badge" th:text="${member.role}">Role</span></td>
                            <td><span class="status-badge active" th:if="${member.status == 'active' or member.status == null}">Active</span><span class="status-badge inactive" th:unless="${member.status == 'active' or member.status == null}">Inactive</span></td>
                        </tr>
                        <tr th:if="${teamMembers == null or #lists.isEmpty(teamMembers)}"><td colspan="5"><div class="empty-state"><div style="font-size:48px;">&#128101;</div><h3>No Team Members</h3></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script>
    var hamburger=document.getElementById('hamburgerBtn'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay');
    function openSidebar(){sidebar.classList.add('open');overlay.classList.add('active');document.body.style.overflow='hidden';}
    function closeSidebar(){sidebar.classList.remove('open');overlay.classList.remove('active');document.body.style.overflow='';}
    if(hamburger)hamburger.addEventListener('click',openSidebar);
    if(overlay)overlay.addEventListener('click',closeSidebar);
    var gs=document.getElementById('globalSearch');if(gs)gs.addEventListener('input',function(){var q=this.value.toLowerCase();document.querySelectorAll('#teamTable tbody tr').forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(q)?'':'none';});});
</script>
<script th:src="@{/auth.js}"></script>
</body>
</html>
