<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR — Settings</title>
    <link rel="stylesheet" th:href="@{/hr.css}">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="mobile-topbar"><button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button><span class="mobile-title">HR</span></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-icon"><i data-lucide="users"></i></div><h2>HR</h2></div>
    <div class="profile-box">
        <div class="profile-avatar" th:text="${#strings.substring(adminName ?: 'H', 0, 1).toUpperCase()}">H</div>
        <h3 th:text="${adminName} ?: 'HR User'">HR User</h3><p th:text="${adminRole} ?: 'HR'">HR</p>
    </div>
    <ul class="sidebar-menu">
        <li><a th:href="@{/hr/dashboard}"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
        <li><a th:href="@{/hr/employees}"><i data-lucide="users"></i> Employees</a></li>
        <li><a th:href="@{/hr/recruitment}"><i data-lucide="briefcase"></i> Recruitment</a></li>
        <li><a th:href="@{/hr/attendance}"><i data-lucide="calendar"></i> Attendance</a></li>
        <li><a th:href="@{/hr/leaves}"><i data-lucide="file-text"></i> Leave Requests</a></li>
        <li><a th:href="@{/hr/teams}"><i data-lucide="users-round"></i> Teams</a></li>
        <li><a th:href="@{/hr/calendar}"><i data-lucide="calendar"></i> Calendar</a></li>
        <li class="active"><a th:href="@{/hr/settings}"><i data-lucide="settings"></i> Settings</a></li>
    </ul>
    <a href="#" data-logout style="text-decoration:none;"><button class="logout-btn"><i data-lucide="log-out"></i> Logout</button></a>
</div>
<div class="main-wrapper">
    <div class="topbar">
        <h1>Settings</h1>
        <div class="topbar-right">
            <div class="search-box"><input type="text" placeholder="Search…"></div>
            <div class="user-badge" th:text="${#strings.substring(adminName ?: 'H', 0, 1).toUpperCase()}">H</div>
        </div>
    </div>
    <div class="page-content">
        <div class="toast success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="toast error"   th:if="${errorMessage}"   th:text="${errorMessage}"></div>
        <div class="settings-container">
            <div class="settings-main">
                <div class="card">
                    <div class="card-header"><div><h2>Profile Settings</h2><p>Update your account information</p></div></div>
                    <form th:action="@{/hr/settings/profile}" method="post" class="settings-form">
                        <div class="form-group">
                            <label>Username</label>
                            <div class="input-wrap">
                                <input type="text" name="username" th:value="${adminName}" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <div class="input-wrap">
                                <input type="email" name="email" th:value="${hrEmail}" placeholder="hr@example.com" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>New Password <span class="optional-text">(leave blank to keep)</span></label>
                            <div class="input-wrap">
                                <input type="password" name="password" placeholder="New password">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Confirm New Password</label>
                            <div class="input-wrap">
                                <input type="password" name="confirmPassword" placeholder="Confirm new password">
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">
                                <i data-lucide="save"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="settings-sidebar">
                <div class="card">
                    <div class="card-header"><div><h2>Info</h2></div></div>
                    <div class="info-section">
                        <div class="info-row">
                            <span class="info-label">Role</span>
                            <span class="info-value">
                                <span class="role-badge">HR</span>
                            </span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Status</span>
                            <span class="info-value">
                                <span class="status-badge active">Active</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    var hamburger=document.getElementById('hamburgerBtn'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay');
    function openSidebar(){sidebar.classList.add('open');overlay.classList.add('active');document.body.style.overflow='hidden';}
    function closeSidebar(){sidebar.classList.remove('open');overlay.classList.remove('active');document.body.style.overflow='';}
    if(hamburger)hamburger.addEventListener('click',openSidebar);
    if(overlay)overlay.addEventListener('click',closeSidebar);
    document.querySelectorAll('.toast').forEach(function(t){requestAnimationFrame(function(){t.classList.add('toast-show');});setTimeout(function(){t.classList.remove('toast-show');t.classList.add('toast-hide');t.addEventListener('transitionend',function(){t.remove();},{once:true});},3500);});
    lucide.createIcons();
</script>
<script th:src="@{/auth.js}"></script>
</body>
</html>
