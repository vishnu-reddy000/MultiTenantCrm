<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees — Add New</title>
    <link rel="stylesheet" th:href="@{/admin.css}">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        .input-wrap { position: relative; }
        .input-wrap .eye-toggle {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; padding: 0;
            color: #9ca3af; display: flex; align-items: center; justify-content: center;
        }
        .input-wrap .eye-toggle:hover { color: #374151; }
        .input-wrap input[type="password"],
        .input-wrap input[type="text"][data-pw] { padding-right: 40px; }
        .select-wrap { position: relative; }
        .select-wrap .select-input { appearance: none; -webkit-appearance: none; padding-right: 40px; width: 100%; }
        .select-wrap .select-arrow {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            pointer-events: none; color: #9ca3af; display: flex; align-items: center;
        }
    </style>
</head>
<body>
<div class="mobile-topbar">
    <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
    <span class="mobile-title">CRM Admin</span>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon"><i data-lucide="layout-dashboard"></i></div>
        <h2>Admin</h2>
    </div>
    <div class="profile-box">
        <div class="profile-avatar" th:text="${#strings.substring(adminName ?: 'Admin', 0, 1).toUpperCase()}">A</div>
        <h3 th:text="${adminName} ?: 'Admin'">Admin</h3>
        <p th:text="${adminRole} ?: 'Admin'">Admin</p>
    </div>
    <ul class="sidebar-menu">
        <li><a th:href="@{/admin/dashboard}"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
        <li class="active"><a th:href="@{/admin/add-user}"><i data-lucide="users"></i> Employees</a></li>
        <li><a th:href="@{/admin/projects}"><i data-lucide="folder-open"></i> Projects</a></li>
        <li><a th:href="@{/admin/tasks}"><i data-lucide="check-square"></i> Tasks</a></li>
        <li><a th:href="@{/admin/reports}"><i data-lucide="file-bar-chart"></i> Reports</a></li>
        <li><a th:href="@{/admin/calendar}"><i data-lucide="calendar"></i> Calendar</a></li>
        <li><a th:href="@{/admin/settings}"><i data-lucide="settings"></i> Settings</a></li>
    </ul>
    <a href="#" data-logout style="text-decoration:none;">
        <button class="logout-btn"><i data-lucide="log-out"></i> Logout</button>
    </a>
</div>

<div class="main-wrapper">
    <div class="topbar">
        <div style="display:flex;align-items:center;gap:14px;">
            <a th:href="@{/admin/add-user}" class="btn btn-clear" style="height:40px;padding:0 16px;font-size:13px;">
                <i data-lucide="arrow-left" style="width:15px;height:15px;"></i> Back
            </a>
            <div>
                <h1>Add New Employee</h1>
                <p class="topbar-subtitle">Fill in the details to create a new account</p>
            </div>
        </div>
        <div class="topbar-right">
            <div class="user-badge" th:text="${#strings.substring(adminName ?: 'Admin', 0, 1).toUpperCase()}">A</div>
        </div>
    </div>

    <div class="page-content">
        <div class="toast success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="toast error"   th:if="${errorMessage}"   th:text="${errorMessage}"></div>

        <div class="card au-form-card">
            <div class="card-header">
                <div>
                    <h2>Employee Details</h2>
                    <p>All fields are required</p>
                </div>
            </div>
            <form th:action="@{/admin/add-user}" method="post">
                <div class="au-form-grid">
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrap">
                            <input type="email" name="email" placeholder="user@example.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <div class="input-wrap">
                            <input type="text" name="username" placeholder="Enter username" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrap">
                            <input type="password" name="password" id="passwordField" placeholder="Create password" required>
                            <button type="button" class="eye-toggle"
                                    onclick="togglePassword('passwordField','eyeIconPassword')" tabindex="-1">
                                <i data-lucide="eye" id="eyeIconPassword" style="width:18px;height:18px;"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <div class="input-wrap">
                            <input type="password" name="confirmPassword" id="confirmPasswordField" placeholder="Confirm password" required>
                            <button type="button" class="eye-toggle"
                                    onclick="togglePassword('confirmPasswordField','eyeIconConfirm')" tabindex="-1">
                                <i data-lucide="eye" id="eyeIconConfirm" style="width:18px;height:18px;"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <div class="input-wrap select-wrap">
                            <select name="role" class="select-input" required>
                                <option value="">Select Role</option>
                                <option value="HR">HR</option>
                                <option value="MANAGER">Manager</option>
                                <option value="EMPLOYEE">Employee</option>
                            </select>
                            <span class="select-arrow">
                                <i data-lucide="chevron-down" style="width:16px;height:16px;"></i>
                            </span>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <a th:href="@{/admin/add-user}" class="btn btn-clear">Cancel</a>
                    <button type="submit" class="btn btn-primary">
                        <i data-lucide="user-plus"></i> Add Employee
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    var hamburger = document.getElementById('hamburgerBtn');
    var sidebar   = document.getElementById('sidebar');
    var overlay   = document.getElementById('sidebarOverlay');
    function openSidebar()  { sidebar.classList.add('open');    overlay.classList.add('active');    document.body.style.overflow = 'hidden'; }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); document.body.style.overflow = ''; }
    if (hamburger) hamburger.addEventListener('click', openSidebar);
    if (overlay)   overlay.addEventListener('click', closeSidebar);
    if (sidebar)   sidebar.querySelectorAll('a').forEach(function(l){ l.addEventListener('click', function(){ if(window.innerWidth<900) closeSidebar(); }); });

    function togglePassword(fieldId, iconId) {
        var field = document.getElementById(fieldId);
        var icon  = document.getElementById(iconId);
        if (field.type === 'password') { field.type = 'text';     icon.setAttribute('data-lucide', 'eye-off'); }
        else                           { field.type = 'password'; icon.setAttribute('data-lucide', 'eye');     }
        lucide.createIcons();
    }

    document.querySelectorAll('.toast').forEach(function(t) {
        setTimeout(function(){ t.classList.add('toast-show'); }, 50);
        setTimeout(function(){ t.classList.remove('toast-show'); t.classList.add('toast-hide'); }, 4000);
    });
</script>
<script th:src="@{/auth.js}"></script>
<script>lucide.createIcons();</script>
</body>
</html>
