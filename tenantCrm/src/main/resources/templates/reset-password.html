<form action="/reset-password" method="post">

<p style="color:red"
   th:if="${error}"
   th:text="${error}">
</p>
    <input type="hidden"
           name="token"
          th:value="${token}">

    <input type="password"
           name="password"
           placeholder="New Password">

    <input type="password"
           name="confirmPassword"
           placeholder="Confirm Password">

    <button type="submit">
        Reset Password
    </button>

</form>
