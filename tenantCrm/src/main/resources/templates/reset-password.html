<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Reset Password — CRM</title>
	<link rel="stylesheet" th:href="@{/reset-password.css}">
</head>

<body>

	<div class="card">

		<!-- Icon -->
		<div class="icon-wrap">
			<svg viewBox="0 0 24 24" aria-hidden="true">
				<rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
				<path d="M7 11V7a5 5 0 0 1 10 0v4" />
			</svg>
		</div>

		<h2>Reset Password</h2>
		<p class="subtitle">Create a strong new password for your CRM account.</p>

		<form action="/reset-password" method="post">

			<!-- ✅ Error message — Thymeleaf attributes untouched -->
			<p class="error-msg" style="display:none" th:if="${error}" th:text="${error}">
			</p>

			<!-- ✅ Hidden token — Thymeleaf attribute untouched -->
			<input type="hidden" name="token" th:value="${token}">

			<!-- New Password -->
			<div class="field">
				<label for="password">New Password</label>
				<div class="input-wrap">
					<input type="password" id="password" name="password" placeholder="New Password" />
					<button type="button" class="toggle-eye" onclick="toggleVisibility('password', this)"
						aria-label="Show password">
						<svg viewBox="0 0 24 24">
							<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
							<circle cx="12" cy="12" r="3" />
						</svg>
					</button>
				</div>
			</div>

			<!-- Confirm Password -->
			<div class="field">
				<label for="confirmPassword">Confirm Password</label>
				<div class="input-wrap">
					<input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" />
					<button type="button" class="toggle-eye" onclick="toggleVisibility('confirmPassword', this)"
						aria-label="Show confirm password">
						<svg viewBox="0 0 24 24">
							<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
							<circle cx="12" cy="12" r="3" />
						</svg>
					</button>
				</div>
			</div>

			<button type="submit">Reset Password</button>

		</form>

		<a href="/login" class="back-link">← Back to Login</a>

	</div>

	<script>
		function toggleVisibility(fieldId, btn) {
			const input = document.getElementById(fieldId);
			const isPassword = input.type === 'password';
			input.type = isPassword ? 'text' : 'password';
			// swap eye icon open/closed
			btn.innerHTML = isPassword
				? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a18.9 18.9 0 0 1 5.06-6.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
				: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
		}
	</script>

</body>

</html>
