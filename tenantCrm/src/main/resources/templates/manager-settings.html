<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager — Settings</title>
    <link rel="stylesheet" th:href="@{/manager.css}">
</head>
<body>
<div class="mobile-topbar"><button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button><span class="mobile-title">&#128202; Manager</span></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">&#128202;</div><h2>Manager</h2></div>
    <div class="profile-box">
        <div class="profile-avatar" th:text="${#strings.substring(managerName ?: 'M', 0, 1).toUpperCase()}">M</div>
        <h3 th:text="${managerName} ?: 'Manager'">Manager</h3><p>Manager</p>
    </div>
    <ul class="sidebar-menu">
        <li><a th:href="@{/manager/dashboard}">&#128202; Dashboard</a></li>
        <li><a th:href="@{/manager/team}">&#128101; My Team</a></li>
        <li><a th:href="@{/manager/projects}">&#128193; Projects</a></li>
        <li><a th:href="@{/manager/tasks}">&#9989; Tasks</a></li>
        <li><a th:href="@{/manager/reports}">&#128196; Reports</a></li>
        <li class="active"><a th:href="@{/manager/settings}">&#9881; Settings</a></li>
    </ul>
    <a href="#" data-logout style="text-decoration:none;"><button class="logout-btn">&#128682; Logout</button></a>
</div>
<div class="main-wrapper">
    <div class="topbar">
        <h1>Settings</h1>
        <div class="topbar-right">
            <div class="search-box"><input type="text" placeholder="Search…"></div>
            <div class="user-badge" th:text="${#strings.substring(managerName ?: 'M', 0, 1).toUpperCase()}">M</div>
        </div>
    </div>
    <div class="page-content">
        <div class="toast success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="toast error"   th:if="${errorMessage}"   th:text="${errorMessage}"></div>
        <div class="dashboard-grid">
            <div class="card">
                <div class="card-header"><div><h2>&#128100; Profile Settings</h2><p>Update your account information</p></div></div>
                <form th:action="@{/manager/settings/profile}" method="post">
                    <div class="form-group"><label>Username</label><div class="input-wrap"><input type="text" name="username" th:value="${managerName}" required></div></div>
                    <div class="form-group"><label>Email Address</label><div class="input-wrap"><input type="email" name="email" th:value="${managerEmail}" placeholder="manager@example.com" required></div></div>
                    <div class="form-group"><label>New Password <span style="color:#6b7280;font-weight:400;">(leave blank to keep)</span></label><div class="input-wrap"><input type="password" name="password" placeholder="New password"></div></div>
                    <div class="form-group"><label>Confirm New Password</label><div class="input-wrap"><input type="password" name="confirmPassword" placeholder="Confirm new password"></div></div>
                    <div class="form-actions"><button type="submit" class="btn btn-primary">&#128190; Save Changes</button></div>
                </form>
            </div>
            <div class="right-col">
                <div class="card">
                    <div class="card-header"><div><h2>&#128736; Info</h2></div></div>
                    <div class="summary-list">
                        <div class="summary-row"><span class="summary-label">Role</span><span class="summary-value"><span class="role-badge">MANAGER</span></span></div>
                        <div class="summary-row"><span class="summary-label">Status</span><span class="summary-value"><span class="status-badge active">Active</span></span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    var hamburger=document.getElementById('hamburgerBtn'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay');
    function openSidebar(){sidebar.classList.add('open');overlay.classList.add('active');document.body.style.overflow='hidden';}
    function closeSidebar(){sidebar.classList.remove('open');overlay.classList.remove('active');document.body.style.overflow='';}
    if(hamburger)hamburger.addEventListener('click',openSidebar);
    if(overlay)overlay.addEventListener('click',closeSidebar);
    document.querySelectorAll('.toast').forEach(t=>{setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .5s';},4000);});
</script>
<script th:src="@{/auth.js}"></script>
</body>
</html>
