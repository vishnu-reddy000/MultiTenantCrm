<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager — Reports</title>
    <link rel="stylesheet" th:href="@{/manager.css}">
</head>
<body>
<div class="mobile-topbar"><button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button><span class="mobile-title">&#128202; Manager</span></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">&#128202;</div><h2>Manager</h2></div>
    <div class="profile-box">
        <div class="profile-avatar" th:text="${#strings.substring(managerName ?: 'M', 0, 1).toUpperCase()}">M</div>
        <h3 th:text="${managerName} ?: 'Manager'">Manager</h3><p>Manager</p>
    </div>
    <ul class="sidebar-menu">
        <li><a th:href="@{/manager/dashboard}">&#128202; Dashboard</a></li>
        <li><a th:href="@{/manager/team}">&#128101; My Team</a></li>
        <li><a th:href="@{/manager/projects}">&#128193; Projects</a></li>
        <li><a th:href="@{/manager/tasks}">&#9989; Tasks</a></li>
        <li class="active"><a th:href="@{/manager/reports}">&#128196; Reports</a></li>
        <li><a th:href="@{/manager/settings}">&#9881; Settings</a></li>
    </ul>
    <a href="#" data-logout style="text-decoration:none;"><button class="logout-btn">&#128682; Logout</button></a>
</div>
<div class="main-wrapper">
    <div class="topbar">
        <h1>Reports</h1>
        <div class="topbar-right">
            <div class="search-box"><input type="text" placeholder="Search…"></div>
            <div class="user-badge" th:text="${#strings.substring(managerName ?: 'M', 0, 1).toUpperCase()}">M</div>
        </div>
    </div>
    <div class="page-content">
        <div class="stats-row" style="grid-template-columns:repeat(3,1fr);">
            <div class="stat-card"><div class="stat-icon purple">&#128101;</div><div class="stat-info"><h3 th:text="${teamCount} ?: '0'">0</h3><p>Team Members</p></div></div>
            <div class="stat-card"><div class="stat-icon blue">&#128193;</div><div class="stat-info"><h3 th:text="${projectCount} ?: '0'">0</h3><p>Projects</p></div></div>
            <div class="stat-card"><div class="stat-icon orange">&#9989;</div><div class="stat-info"><h3 th:text="${taskCount} ?: '0'">0</h3><p>Tasks</p></div></div>
        </div>
        <div class="card">
            <div class="card-header"><div><h2>Team Summary</h2><p>Overview of your team's performance</p></div></div>
            <div class="summary-list">
                <div class="summary-row"><span class="summary-label">Team Members</span><span class="summary-value" th:text="${teamCount} ?: '0'">0</span></div>
                <div class="summary-row"><span class="summary-label">Active Projects</span><span class="summary-value" th:text="${projectCount} ?: '0'">0</span></div>
                <div class="summary-row"><span class="summary-label">Total Tasks</span><span class="summary-value" th:text="${taskCount} ?: '0'">0</span></div>
                <div class="summary-row"><span class="summary-label">Overdue Tasks</span><span class="summary-value" th:text="${overdueTasks} ?: '0'">0</span></div>
            </div>
        </div>
    </div>
</div>
<script>
    var hamburger=document.getElementById('hamburgerBtn'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay');
    function openSidebar(){sidebar.classList.add('open');overlay.classList.add('active');document.body.style.overflow='hidden';}
    function closeSidebar(){sidebar.classList.remove('open');overlay.classList.remove('active');document.body.style.overflow='';}
    if(hamburger)hamburger.addEventListener('click',openSidebar);
    if(overlay)overlay.addEventListener('click',closeSidebar);
</script>
<script th:src="@{/auth.js}"></script>
</body>
</html>
