# ===================================================================
# Spring Boot Production Properties Profile (prod)
# File Path: tenantCrm/src/main/resources/application-prod.properties
# ===================================================================

spring.application.name=tenantCrm

# ── Server Configuration ───────────────────────────────────────────
server.port=${PORT:9090}
server.servlet.session.tracking-modes=cookie
server.servlet.session.timeout=1s

# ── Database Configuration (MySQL) ──────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/crm?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Root@12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate Settings ────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ── Logging Configurations ──────────────────────────────────────────
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF

# ── JWT Security Configurations ─────────────────────────────────────
# CRITICAL: Override APP_JWT_SECRET in production env variable
app.jwt.secret=${APP_JWT_SECRET:Y3JtU2VjcmV0S2V5Rm9yVGVuYW50Q3JtQXBwbGljYXRpb24yMDI2}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:28800000}

# ── SMTP Mail Configurations ────────────────────────────────────────
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Customizable Security API Paths ─────────────────────────────────
app.security.holidays-api-path=/api/holidays/**
app.security.notifications-api-path=/api/notifications/**

# ── Super Admin Seeding Default Credentials ─────────────────────────
app.security.superadmin.default-password=${SUPERADMIN_PASSWORD:superadmin123}
