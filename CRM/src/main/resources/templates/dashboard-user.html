<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>User Dashboard</title>
	<link rel="icon" type="image/svg+xml"
		href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23DC2626'/%3E%3Ctext x='16' y='23' font-family='Arial' font-size='20' font-weight='bold' text-anchor='middle' fill='white'%3EC%3C/text%3E%3C/svg%3E" />

	<link rel="stylesheet" th:href="@{/dashboard-user.css}">
	<link
		href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

	<div class="dashboard">

		<!-- Sidebar -->
		<aside class="sidebar">
			<div class="sidebar-profile">
				<div class="avatar-ring">
					<div class="avatar">
						<i class="fas fa-user"></i>
					</div>
				</div>
				<h2 class="user-name">JOHN DON</h2>
				<p class="user-email">johndon@company.com</p>
			</div>

			<nav class="sidebar-nav">
				<a href="#" class="nav-item active">
					<i class="fas fa-home"></i>
					<span>home</span>
				</a>
				<a href="#" class="nav-item">
					<i class="fas fa-folder"></i>
					<span>file</span>
				</a>
				<a href="#" class="nav-item">
					<i class="fas fa-envelope"></i>
					<span>messages</span>
				</a>
				<a href="#" class="nav-item">
					<i class="fas fa-bell"></i>
					<span>notification</span>
				</a>
				<a href="#" class="nav-item">
					<i class="fas fa-map-marker-alt"></i>
					<span>location</span>
				</a>
				<a href="#" class="nav-item">
					<i class="fas fa-chart-pie"></i>
					<span>graph</span>
				</a>
			</nav>

			<form action="/logout" method="post" class="logout-form">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
				<button type="submit" class="logout-btn">
					<i class="fas fa-sign-out-alt"></i>
					<span>Logout</span>
				</button>
			</form>
		</aside>

		<!-- Main Content -->
		<main class="main-content">

			<!-- Top Bar -->
			<header class="top-bar">
				<h1 class="page-title">Dashboard User</h1>
				
			</header>

			<!-- Stats Cards -->
			<section class="stats-grid">
				<div class="stat-card stat-card--dark">
					<div class="stat-header">
						<span class="stat-label">Earning</span>
						<div class="stat-icon stat-icon--dollar">
							<i class="fas fa-dollar-sign"></i>
						</div>
					</div>
					<div class="stat-value">$ 628</div>
					<div class="stat-bar">
						<div class="stat-bar-fill" style="width:62%"></div>
					</div>
				</div>
				<div class="stat-card">
					<div class="stat-header">
						<span class="stat-label">Share</span>
						<div class="stat-icon stat-icon--share">
							<i class="fas fa-share-alt"></i>
						</div>
					</div>
					<div class="stat-value stat-value--dark">2434</div>
				</div>
				<div class="stat-card">
					<div class="stat-header">
						<span class="stat-label">Likes</span>
						<div class="stat-icon stat-icon--like">
							<i class="fas fa-thumbs-up"></i>
						</div>
					</div>
					<div class="stat-value stat-value--dark">1259</div>
				</div>
				<div class="stat-card">
					<div class="stat-header">
						<span class="stat-label">Rating</span>
						<div class="stat-icon stat-icon--star">
							<i class="fas fa-star"></i>
						</div>
					</div>
					<div class="stat-value stat-value--dark">8.5</div>
				</div>
			</section>

			<!-- Charts Row -->
			<section class="charts-row">

				<!-- Bar Chart -->
				<div class="chart-card chart-card--wide">
					<div class="chart-header">
						<span class="chart-title">Result</span>
						<button class="check-btn">Check Now</button>
					</div>
					<div class="bar-chart-wrap">
						<div class="y-axis">
							<span>50</span><span>40</span><span>30</span><span>20</span><span>10</span>
						</div>
						<div class="bar-chart" id="barChart">
							<!-- Bars generated by JS -->
						</div>
						<div class="x-axis" id="xAxis"></div>
					</div>
					<div class="chart-legend">
						<span class="legend-dot legend-dot--dark"></span><span>2019</span>
						<span class="legend-dot legend-dot--orange"></span><span>2020</span>
					</div>
				</div>

				<!-- Donut Chart -->
				<div class="chart-card chart-card--donut">
					<div class="donut-wrap">
						<svg class="donut-svg" viewBox="0 0 120 120">
							<circle class="donut-track" cx="60" cy="60" r="46" fill="none" stroke="#e8ecf0"
								stroke-width="14" />
							<circle class="donut-fill donut-fill--dark" cx="60" cy="60" r="46" fill="none"
								stroke="#1a2e4a" stroke-width="14" stroke-dasharray="289" stroke-dashoffset="289"
								stroke-linecap="round" transform="rotate(-90 60 60)" />
							<circle class="donut-fill donut-fill--orange" cx="60" cy="60" r="46" fill="none"
								stroke="#f5a623" stroke-width="14" stroke-dasharray="289" stroke-dashoffset="289"
								stroke-linecap="round" transform="rotate(-90 60 60)" />
							<text x="60" y="65" text-anchor="middle" class="donut-label">45%</text>
						</svg>
					</div>
					<ul class="donut-list">
						<li>Lorem ipsum</li>
						<li>Lorem ipsum</li>
						<li>Lorem ipsum</li>
						<li>Lorem ipsum</li>
					</ul>
					<button class="check-btn check-btn--full">Check Now</button>
				</div>
			</section>

			<!-- Bottom Row -->
			<section class="bottom-row">

				<!-- Area Chart -->
				<div class="chart-card chart-card--area">
					<div class="area-legend">
						<span class="legend-dot legend-dot--orange"></span><span>Lorem Ipsum</span>
						<span class="legend-dot legend-dot--dark" style="margin-left:1rem"></span><span>Dolor
							Amet</span>
					</div>
					<div class="area-chart-wrap">
						<svg class="area-svg" viewBox="0 0 500 160" preserveAspectRatio="none">
							<defs>
								<linearGradient id="gradOrange" x1="0" y1="0" x2="0" y2="1">
									<stop offset="0%" stop-color="#f5a623" stop-opacity="0.85" />
									<stop offset="100%" stop-color="#f5a623" stop-opacity="0.1" />
								</linearGradient>
								<linearGradient id="gradDark" x1="0" y1="0" x2="0" y2="1">
									<stop offset="0%" stop-color="#1a2e4a" stop-opacity="0.9" />
									<stop offset="100%" stop-color="#1a2e4a" stop-opacity="0.1" />
								</linearGradient>
							</defs>
							<!-- Orange area -->
							<path class="area-path area-path--orange"
								d="M0,120 C40,110 60,50 100,60 C140,70 160,90 200,70 C240,50 260,30 300,40 C340,50 360,80 400,60 C440,40 470,80 500,70 L500,160 L0,160 Z"
								fill="url(#gradOrange)" />
							<!-- Dark area -->
							<path class="area-path area-path--dark"
								d="M0,140 C40,130 60,90 100,100 C140,110 160,120 200,100 C240,80 260,70 300,80 C340,90 360,110 400,90 C440,70 470,100 500,90 L500,160 L0,160 Z"
								fill="url(#gradDark)" />
						</svg>
					</div>
				</div>

				<!-- Calendar -->
				<div class="chart-card chart-card--calendar">
					<div class="calendar" id="calendar">
						<!-- Calendar rendered by JS -->
					</div>
				</div>
			</section>

		</main>
	</div>

	<script>
		// ---- Bar Chart ----
		const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUNE', 'JULY', 'AUG', 'SEP'];
		const data2019 = [28, 35, 22, 38, 30, 50, 42, 32, 25];
		const data2020 = [20, 25, 18, 28, 22, 38, 30, 20, 18];

		const barChart = document.getElementById('barChart');
		const xAxis = document.getElementById('xAxis');

		months.forEach((m, i) => {
			const group = document.createElement('div');
			group.className = 'bar-group';

			const b1 = document.createElement('div');
			b1.className = 'bar bar--dark';
			b1.style.setProperty('--h', data2019[i] + '%');
			b1.setAttribute('data-val', data2019[i]);

			const b2 = document.createElement('div');
			b2.className = 'bar bar--orange';
			b2.style.setProperty('--h', data2020[i] + '%');
			b2.setAttribute('data-val', data2020[i]);

			group.appendChild(b1);
			group.appendChild(b2);
			barChart.appendChild(group);

			const label = document.createElement('span');
			label.textContent = m;
			xAxis.appendChild(label);
		});

		// Animate bars after load
		setTimeout(() => {
			document.querySelectorAll('.bar').forEach((bar, i) => {
				setTimeout(() => bar.classList.add('bar--animated'), i * 60);
			});
		}, 300);

		// ---- Donut Chart ----
		const circumference = 2 * Math.PI * 46; // ~289
		const darkPct = 0.55;
		const orangePct = 0.45;
		const darkFill = document.querySelector('.donut-fill--dark');
		const orangeFill = document.querySelector('.donut-fill--orange');

		setTimeout(() => {
			darkFill.style.transition = 'stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)';
			darkFill.style.strokeDashoffset = circumference * (1 - darkPct);

			const orangeRotation = -90 + darkPct * 360;
			orangeFill.setAttribute('transform', `rotate(${orangeRotation} 60 60)`);
			orangeFill.style.transition = 'stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1) 0.3s';
			orangeFill.style.strokeDashoffset = circumference * (1 - orangePct);
		}, 600);

		// ---- Calendar ----
		const cal = document.getElementById('calendar');
		const today = new Date();
		const year = today.getFullYear();
		const month = today.getMonth();
		const days = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
		const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

		const header = document.createElement('div');
		header.className = 'cal-header';
		header.textContent = `${monthNames[month]} ${year}`;
		cal.appendChild(header);

		const grid = document.createElement('div');
		grid.className = 'cal-grid';

		days.forEach(d => {
			const dh = document.createElement('span');
			dh.className = 'cal-day-name';
			dh.textContent = d;
			grid.appendChild(dh);
		});

		const firstDay = new Date(year, month, 1).getDay();
		for (let i = 0; i < firstDay; i++) {
			const empty = document.createElement('span');
			grid.appendChild(empty);
		}

		const totalDays = new Date(year, month + 1, 0).getDate();
		for (let d = 1; d <= totalDays; d++) {
			const cell = document.createElement('span');
			cell.className = 'cal-day';
			cell.textContent = d;
			if (d === today.getDate()) cell.classList.add('cal-day--today');
			if (d === 12 || d === 25) cell.classList.add('cal-day--highlight');
			grid.appendChild(cell);
		}

		cal.appendChild(grid);

		// Nav item click
		document.querySelectorAll('.nav-item').forEach(item => {
			item.addEventListener('click', e => {
				e.preventDefault();
				document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
				item.classList.add('active');
			});
		});
	</script>

</body>

</html>
