<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/manager-layout :: layout('Follow-ups', 'followups', ~{::section})}">
<section>

  <div class="page-header">
    <div class="ph-left">
      <div class="page-eyebrow">Activities</div>
      <h1 class="page-title">Follow-ups</h1>
      <p class="page-subtitle">Track pending follow-ups and ensure no lead goes cold</p>
    </div>
  </div>

  <!-- KPI Row -->
  <section class="kpi-grid" style="margin-top:1.2rem">
    <div class="kpi-card">
      <div class="kpi-body"><p class="kpi-label">Pending Follow-ups</p><h2 class="kpi-value" th:text="${pendingLeads ?: 0}">0</h2><span class="kpi-change kpi-warn"><i class="fas fa-clock"></i> Need attention</span></div>
      <div class="kpi-icon kpi-icon-3"><i class="fas fa-redo-alt"></i></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-body"><p class="kpi-label">Due Today</p><h2 class="kpi-value">—</h2><span class="kpi-change kpi-warn"><i class="fas fa-calendar-day"></i> Today</span></div>
      <div class="kpi-icon kpi-icon-1"><i class="fas fa-calendar-day"></i></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-body"><p class="kpi-label">Overdue</p><h2 class="kpi-value">—</h2><span class="kpi-change kpi-down"><i class="fas fa-exclamation-triangle"></i> Overdue</span></div>
      <div class="kpi-icon kpi-icon-4"><i class="fas fa-exclamation-triangle"></i></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-body"><p class="kpi-label">Completed</p><h2 class="kpi-value">—</h2><span class="kpi-change kpi-up"><i class="fas fa-check"></i> Done</span></div>
      <div class="kpi-icon kpi-icon-2"><i class="fas fa-circle-check"></i></div>
    </div>
  </section>

  <!-- Follow-ups Table -->
  <div class="card card--table" style="margin-top:1.2rem">
    <div class="table-head">
      <h3 class="card-title"><i class="fas fa-redo-alt" style="color:var(--primary)"></i> Follow-up Queue</h3>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr><th>Lead Name</th><th>Assigned To</th><th>Due Date</th><th>Priority</th><th>Status</th></tr>
        </thead>
        <tbody>
          <tr><td colspan="5" style="text-align:center;padding:2.5rem;color:var(--muted)">
            <i class="fas fa-redo-alt" style="font-size:1.5rem;display:block;margin-bottom:.5rem;color:var(--muted-2)"></i>
            No follow-ups pending.
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

</section>
</html>
