<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<!--
  Admin Layout Fragment
  Usage: th:replace="~{fragments/admin-layout :: layout('Page Title', 'active-nav-key', ~{::section})}"
  Active nav keys: dashboard, manage-users, add-user, view-leads, add-lead, assign-leads,
                   lead-status, calls, meetings, tasks, deals, pipeline-stages, won-lost,
                   sales-reports, performance-reports, revenue-reports, notifications, settings, profile
-->

<th:block th:fragment="layout(pageTitle, activeNav, content)">
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${pageTitle} + ' | CRMS — Admin'">Admin | CRMS</title>

	<link rel="icon" type="image/svg+xml"
		href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%234ade80'/%3E%3Cstop offset='60%25' stop-color='%23f97316'/%3E%3Cstop offset='100%25' stop-color='%23ef4444'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='7' fill='url(%23g)'/%3E%3Ctext x='16' y='23' font-family='Arial' font-size='18' font-weight='bold' text-anchor='middle' fill='white'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E" />

	<link rel="stylesheet" th:href="@{/dashboard-admin.css}" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

	<!-- Sidebar overlay (mobile) -->
	<div class="sidebar-overlay" id="sidebarOverlay"></div>

	<!-- ═══════════════════ SIDEBAR ═══════════════════ -->
	<aside class="sidebar" id="sidebar">

		<div class="sidebar-logo">
			<div class="logo-icon" style="background: linear-gradient(135deg, #4ade80 0%, #f97316 60%, #ef4444 100%); border-radius: 10px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 8px rgba(249,115,22,0.4);">
				<i class="fas fa-fire" style="color: white; font-size: 18px;"></i>
			</div>
			<span class="logo-text" style="font-size: 1.15rem; font-weight: 800; color: #fff; letter-spacing: -0.3px;">CRMS</span>
		</div>

		<nav class="sidebar-nav">
			<div class="nav-label">Main</div>

			<a th:href="@{/admin/dashboard}"
				th:class="${activeNav == 'dashboard'} ? 'nav-item active' : 'nav-item'">
				<span class="nav-icon">
					<svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/><path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"/></svg>
				</span>
				Dashboard
			</a>

			<div class="nav-label">Employees</div>

			<a th:href="@{/admin/employees}"
				th:class="${activeNav == 'employees'} ? 'nav-item active' : 'nav-item'">
				<span class="nav-icon">
					<svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>
				</span>
				Employees
			</a>

			<a th:href="@{/admin/users/add}"
				th:class="${activeNav == 'add-user' or activeNav == 'manage-users'} ? 'nav-item active' : 'nav-item'">
				<span class="nav-icon">
					<svg viewBox="0 0 20 20" fill="currentColor"><path d="M8 9a3 3 0 100-6 3 3 0 000 6zm-5 6a5 5 0 0110 0H3zm13-6a1 1 0 10-2 0v2h-2a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V9z"/></svg>
				</span>
				Users
			</a>

			<div class="nav-label">Leads</div>

			<a th:href="@{/admin/leads}"
				th:class="${activeNav == 'view-leads'} ? 'nav-item active' : 'nav-item'">
				<span class="nav-icon">
					<svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 000 2v8a2 2 0 002 2h2.586l-1.293 1.293a1 1 0 101.414 1.414L10 15.414l2.293 2.293a1 1 0 001.414-1.414L12.414 15H15a2 2 0 002-2V5a1 1 0 100-2H3zm11.707 4.707a1 1 0 00-1.414-1.414L10 9.586 8.707 8.293a1 1 0 00-1.414 0l-2 2a1 1 0 101.414 1.414L8 10.414l1.293 1.293a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
				</span>
				All Leads
			</a>

			<a th:href="@{/admin/leads/add}"
				th:class="${activeNav == 'add-lead'} ? 'nav-item active' : 'nav-item'">
				<span class="nav-icon">
					<svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
				</span>
				Add Lead
			</a>

			<a th:href="@{/admin/pipeline/deals}"
				th:class="${activeNav == 'deals'} ? 'nav-item active' : 'nav-item'">
				<span class="nav-icon">
					<svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 4a2 2 0 00-2 2v4a2 2 0 002 2V6h10a2 2 0 00-2-2H4zm2 6a2 2 0 012-2h8a2 2 0 012 2v4a2 2 0 01-2 2H8a2 2 0 01-2-2v-4zm6 4a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"/></svg>
				</span>
				Deals
			</a>

			<div class="nav-label">Activities</div>

			<a th:href="@{/admin/activities/calls}"
				th:class="${activeNav == 'calls'} ? 'nav-item active' : 'nav-item'">
				<span class="nav-icon">
					<svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"/></svg>
				</span>
				Calls
			</a>

			<a th:href="@{/admin/activities/meetings}"
				th:class="${activeNav == 'meetings'} ? 'nav-item active' : 'nav-item'">
				<span class="nav-icon">
					<svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
				</span>
				Meetings
			</a>

			<a th:href="@{/admin/activities/tasks}"
				th:class="${activeNav == 'tasks'} ? 'nav-item active' : 'nav-item'">
				<span class="nav-icon">
					<svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
				</span>
				Tasks
			</a>

			<div class="nav-label">Reports</div>

			<a th:href="@{/admin/reports/sales}"
				th:class="${activeNav == 'sales-reports'} ? 'nav-item active' : 'nav-item'">
				<span class="nav-icon">
					<svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 000 2v8a2 2 0 002 2h2.586l-1.293 1.293a1 1 0 101.414 1.414L10 15.414l2.293 2.293a1 1 0 001.414-1.414L12.414 15H15a2 2 0 002-2V5a1 1 0 100-2H3zm11.707 4.707a1 1 0 00-1.414-1.414L10 9.586 8.707 8.293a1 1 0 00-1.414 0l-2 2a1 1 0 101.414 1.414L8 10.414l1.293 1.293a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
				</span>
				Sales Reports
			</a>

			<a th:href="@{/admin/reports/performance}"
				th:class="${activeNav == 'performance-reports'} ? 'nav-item active' : 'nav-item'">
				<span class="nav-icon">
					<svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/></svg>
				</span>
				Performance
			</a>

			<div class="nav-label">System</div>

			<a th:href="@{/admin/notifications}"
				th:class="${activeNav == 'notifications'} ? 'nav-item active' : 'nav-item'">
				<span class="nav-icon">
					<svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/></svg>
				</span>
				Notifications
			</a>

			<a th:href="@{/admin/settings}"
				th:class="${activeNav == 'settings'} ? 'nav-item active' : 'nav-item'">
				<span class="nav-icon">
					<svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
				</span>
				Settings
			</a>

			<a th:href="@{/admin/profile}"
				th:class="${activeNav == 'profile'} ? 'nav-item active' : 'nav-item'">
				<span class="nav-icon">
					<svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
				</span>
				Profile
			</a>
		</nav>

		<div class="sidebar-footer">
			<form th:action="@{/logout}" method="post">
				<button type="submit" class="logout-btn">
					<svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/></svg>
					Logout
				</button>
			</form>
		</div>
	</aside>

	<!-- ═══════════════════ MAIN WRAPPER ═══════════════════ -->
	<div class="main-wrapper">

		<!-- ── Topbar ── -->
		<header class="topbar">
			<button class="hamburger" id="hamburger" aria-label="Toggle sidebar">
				<span></span><span></span><span></span>
			</button>

			<div class="search-box">
				<svg class="search-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
				<input type="text" th:placeholder="'Search ' + ${pageTitle} + '…'" aria-label="Search">
			</div>

			<div class="topbar-right">
				<button class="notif-btn" title="Notifications" aria-label="Notifications">
					<svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/></svg>
				</button>

				<div class="avatar-wrap">
					<div class="avatar">A</div>
					<div class="avatar-info">
						<span>Admin</span>
						<small>Administrator</small>
					</div>
				</div>
			</div>
		</header>

		<!-- ── Content ── -->
		<main class="content">
			<th:block th:replace="${content}" />
		</main>
	</div>

	<script th:src="@{/dashboard-admin.js}"></script>
	<script>
		/* Confirm delete helper — reads username from data-username attribute
		   to avoid Thymeleaf 3.1 restriction on strings in event handlers */
		function confirmDelete(form) {
			var name = form.getAttribute('data-username')
				|| form.getAttribute('data-name')
				|| 'this item';
			return confirm('Delete "' + name + '"? This cannot be undone.');
		}
	</script>

</body>
</html>
</th:block>

</html>
