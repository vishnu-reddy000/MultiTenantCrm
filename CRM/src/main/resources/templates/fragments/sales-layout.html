<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<!--
  Sales Executive Layout Fragment
  Usage: th:replace="~{fragments/sales-layout :: layout('Page Title', 'active-nav-key', ~{::section})}"
  Nav keys: dashboard, my-leads, add-lead, followups,
            deals, stages,
            calls, meetings, tasks,
            calendar, performance, notifications, profile
-->

<th:block th:fragment="layout(pageTitle, activeNav, content)">
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle} + ' – CRM Portal'">Sales Executive</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23667EEA'/%3E%3Ctext x='16' y='23' font-family='Arial' font-size='18' font-weight='bold' text-anchor='middle' fill='white'%3ES%3C/text%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" th:href="@{/dashboard-sales-executive.css}">
</head>
<body>

<div class="dashboard" id="dashboardRoot">

  <!-- ===================== SIDEBAR ===================== -->
  <aside class="sidebar" id="sidebar">

    <!-- Profile block -->
    <div class="sidebar-profile">
      <div style="width:52px;height:52px;border-radius:13px;background:linear-gradient(135deg,#667EEA,#764BA2);display:flex;align-items:center;justify-content:center;margin-bottom:.9rem;font-size:1.3rem;font-weight:700;color:#fff;flex-shrink:0;">
        <span th:text="${#authentication?.name?.substring(0,1)?.toUpperCase() ?: 'S'}">S</span>
      </div>
      <h2 class="user-name" th:text="${#authentication?.name ?: 'Sales Exec'}">Sales Exec</h2>
      <p class="user-email">Sales Executive</p>
      <span class="user-role-badge">Sales Executive</span>
    </div>

    <nav class="sidebar-nav" id="sidebarNav">

      <!-- ── Main ── -->
      <p class="nav-section-label">Main</p>
      <a th:href="@{/sales/dashboard}"
         th:class="${activeNav=='dashboard'} ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-th-large"></i><span>Dashboard</span>
      </a>

      <!-- ── My Leads ── -->
      <p class="nav-section-label">Leads</p>
      <a th:href="@{/sales/leads}"
         th:class="${activeNav=='my-leads'} ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-users"></i><span>My Leads</span>
        <span class="nav-badge" th:text="${myLeadsCount ?: 0}">0</span>
      </a>
      <a th:href="@{/sales/leads/add}"
         th:class="${activeNav=='add-lead'} ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-user-plus"></i><span>Add Lead</span>
      </a>
      <a th:href="@{/sales/leads/followups}"
         th:class="${activeNav=='followups'} ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-redo-alt"></i><span>Lead Follow-ups</span>
        <span class="nav-badge nav-badge--warn" th:text="${followupCount ?: 0}">0</span>
      </a>

      <!-- ── Sales Pipeline ── -->
      <p class="nav-section-label">Sales Pipeline</p>
      <a th:href="@{/sales/pipeline/deals}"
         th:class="${activeNav=='deals'} ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-handshake"></i><span>My Deals</span>
      </a>
      <a th:href="@{/sales/pipeline/stages}"
         th:class="${activeNav=='stages'} ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-layer-group"></i><span>Deal Stages</span>
      </a>

      <!-- ── Activities ── -->
      <p class="nav-section-label">Activities</p>
      <a th:href="@{/sales/activities/calls}"
         th:class="${activeNav=='calls'} ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-phone-alt"></i><span>Calls</span>
      </a>
      <a th:href="@{/sales/activities/meetings}"
         th:class="${activeNav=='meetings'} ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-calendar-check"></i><span>Meetings</span>
      </a>
      <a th:href="@{/sales/activities/tasks}"
         th:class="${activeNav=='tasks'} ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-tasks"></i><span>Tasks</span>
        <span class="nav-badge nav-badge--warn" th:text="${pendingTasksCount ?: 0}">0</span>
      </a>

      <!-- ── More ── -->
      <p class="nav-section-label">More</p>
      <a th:href="@{/sales/calendar}"
         th:class="${activeNav=='calendar'} ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-calendar-alt"></i><span>Calendar</span>
      </a>
      <a th:href="@{/sales/performance}"
         th:class="${activeNav=='performance'} ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-chart-line"></i><span>Performance</span>
      </a>
      <a th:href="@{/sales/notifications}"
         th:class="${activeNav=='notifications'} ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-bell"></i><span>Notifications</span>
        <span class="nav-badge" th:if="${notifCount > 0}" th:text="${notifCount}">0</span>
      </a>
      <a th:href="@{/sales/profile}"
         th:class="${activeNav=='profile'} ? 'nav-item active' : 'nav-item'">
        <i class="fas fa-user-circle"></i><span>Profile</span>
      </a>

    </nav>

    <!-- Logout -->
    <form th:action="@{/logout}" method="post" class="logout-form">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i><span>Logout</span>
      </button>
    </form>

  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ===================== MAIN CONTENT ===================== -->
  <main class="main-content">

    <header class="top-bar">
      <div class="top-bar-left">
        
        <div>
          <h1 class="page-title" th:text="${pageTitle}">Page</h1>
          <p class="page-subtitle" th:text="${pageSubtitle ?: 'Sales Executive Portal'}">Sales Executive Portal</p>
        </div>
      </div>
      <div class="top-bar-right">
        <a th:href="@{/sales/leads/add}" class="top-btn">
          <i class="fas fa-plus"></i> New Lead
        </a>
        <a th:href="@{/sales/notifications}" class="top-notif" aria-label="Notifications">
          <i class="fas fa-bell"></i>
          <span class="notif-dot" th:if="${notifCount > 0}"></span>
        </a>
        <div class="top-avatar">
          <div class="avatar-sm" style="background:linear-gradient(135deg,#667EEA,#764BA2)">
            <span th:text="${#authentication?.name?.substring(0,1)?.toUpperCase() ?: 'S'}">S</span>
          </div>
          <span th:text="${#authentication?.name ?: 'Exec'}">Exec</span>
        </div>
      </div>
    </header>

    <!-- Flash messages -->
    <div th:if="${success}" class="toast toast--success" th:text="${success}"></div>
    <div th:if="${error}"   class="toast toast--error"   th:text="${error}"></div>

    <th:block th:replace="${content}" />

  </main>
</div>

<script th:src="@{/dashboard-sales-executive.js}" th:if="${false}"></script>
<script>
  const menuToggle = document.getElementById('menuToggle');
  const sidebar    = document.getElementById('sidebar');
  const overlay    = document.getElementById('sidebarOverlay');
  if (menuToggle) {
    menuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('show');
    });
    overlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('show');
    });
  }
</script>

</body>
</html>
</th:block>

</html>
