<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/admin-layout :: layout('Add User', 'add-user', ~{::section})}">

<head></head>
<body>

<section>

	<!-- Page Header -->
	<div class="page-header">
		<div>
			<h1>User Management</h1>
			<p>Manage existing Managers and Sales Executives.</p>
		</div>
		<div class="page-header-actions">
			<a th:href="@{/admin/users/new}" class="btn-primary">
				<svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"
					style="display:inline;vertical-align:middle;margin-right:4px">
					<path fill-rule="evenodd"
						d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
						clip-rule="evenodd" />
				</svg>
				Add User
			</a>
		</div>
	</div>

	<!-- Toast Notifications -->
	<div th:if="${success}" class="toast toast-success" th:text="${success}"></div>
	<div th:if="${error}" class="toast toast-error" th:text="${error}"></div>

	<!-- ── Users Table ──────────────────────────────────────────────────── -->
	<h2 class="section-title" style="margin-top:0">
		<span class="section-title-icon">👥</span> All Users
		<span style="margin-left:8px;font-size:0.8rem;font-weight:500;color:var(--muted);background:var(--bg);padding:2px 10px;border-radius:99px;border:1px solid var(--border)"
			th:text="${#lists.size(allUsers)} + ' total'">0 total</span>
	</h2>

	<section class="table-card">
		<div class="table-header">
			<div class="table-header-left">
				<input type="text" id="userSearch" class="form-input"
					placeholder="Search by name, email or role..."
					style="width:280px;padding:8px 12px;font-size:0.85rem"
					oninput="filterUserTable(this.value)" />
			</div>
		</div>

		<div class="table-wrap">
			<table id="usersTable">
				<thead>
					<tr>
						<th>#</th>
						<th>Username</th>
						<th>Email</th>
						<th>Phone</th>
						<th>Role</th>
						<th>Status</th>
						<th>Created</th>
						<th>Actions</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="u, i : ${allUsers}">
						<td th:text="${i.count}">1</td>
						<td class="td-bold" th:text="${u.username}">—</td>
						<td th:text="${u.email}">—</td>
						<td th:text="${u.phone ?: '—'}">—</td>
						<td>
							<span th:if="${u.role?.name() == 'MANAGER'}" class="badge badge-approved">Manager</span>
							<span th:if="${u.role?.name() == 'SALES_EXECUTIVE'}" class="badge badge-pending">Sales Executive</span>
						</td>
						<td>
							<span th:if="${u.status?.name() == 'ACTIVE'}" class="badge badge-approved">Active</span>
							<span th:unless="${u.status?.name() == 'ACTIVE'}" class="badge badge-rejected">Inactive</span>
						</td>
						<td th:text="${u.createdAt != null ? #temporals.format(u.createdAt, 'dd MMM yyyy') : '—'}">—</td>
						<td class="td-actions">
							<!--
							  th:onsubmit is blocked in Thymeleaf 3.1+ for string expressions.
							  Use data-username + a plain JS helper instead.
							-->
							<form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post"
								style="display:inline"
								th:data-username="${u.username}"
								onsubmit="return confirmDelete(this)">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
								<button type="submit" class="action-link action-delete">
									<svg viewBox="0 0 20 20" fill="currentColor" width="13" height="13"
										style="display:inline;vertical-align:middle;margin-right:2px">
										<path fill-rule="evenodd"
											d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"
											clip-rule="evenodd" />
									</svg>
									Delete
								</button>
							</form>
						</td>
					</tr>
					<tr th:if="${#lists.isEmpty(allUsers)}" id="emptyRow">
						<td colspan="8" class="table-empty">
							No users yet. Click <strong>Add User</strong> to create one.
						</td>
					</tr>
					<tr id="noResultsRow" style="display:none">
						<td colspan="8" class="table-empty">No users match your search.</td>
					</tr>
				</tbody>
			</table>
		</div>
	</section>

</section>

</body>
</html>
