<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/manager-layout :: layout('Revenue', 'revenue', ~{::section})}">
<section>

  <div class="page-header">
    <div class="ph-left">
      <div class="page-eyebrow">Reports</div>
      <h1 class="page-title">Revenue</h1>
      <p class="page-subtitle">Track revenue generated by your team's closed deals</p>
    </div>
  </div>

  <!-- KPI Row -->
  <section class="kpi-grid" style="margin-top:1.2rem">
    <div class="kpi-card">
      <div class="kpi-body">
        <p class="kpi-label">Total Revenue</p>
        <h2 class="kpi-value" th:text="${approvedValue != null ? '₹' + approvedValue : '₹0'}">₹0</h2>
        <span class="kpi-change kpi-up"><i class="fas fa-arrow-trend-up"></i> All time</span>
      </div>
      <div class="kpi-icon kpi-icon-1"><i class="fas fa-sack-dollar"></i></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-body"><p class="kpi-label">Deals Closed</p><h2 class="kpi-value" th:text="${approvedLeads ?: 0}">0</h2><span class="kpi-change kpi-up"><i class="fas fa-handshake"></i> Won</span></div>
      <div class="kpi-icon kpi-icon-2"><i class="fas fa-handshake"></i></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-body"><p class="kpi-label">This Month</p><h2 class="kpi-value">—</h2><span class="kpi-change kpi-up"><i class="fas fa-calendar"></i> Monthly</span></div>
      <div class="kpi-icon kpi-icon-3"><i class="fas fa-calendar-check"></i></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-body"><p class="kpi-label">Target</p><h2 class="kpi-value">—</h2><span class="kpi-change kpi-up"><i class="fas fa-bullseye"></i> Monthly goal</span></div>
      <div class="kpi-icon kpi-icon-4"><i class="fas fa-bullseye"></i></div>
    </div>
  </section>

  <!-- Revenue Breakdown -->
  <div class="card" style="margin-top:1.2rem">
    <div class="card-head">
      <h3 class="card-title"><i class="fas fa-dollar-sign" style="color:var(--primary)"></i> Revenue Breakdown</h3>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem">
      <div style="padding:1.2rem;background:var(--bg);border-radius:var(--r-sm);text-align:center;border-top:3px solid var(--primary)">
        <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.5rem">This Week</div>
        <div style="font-size:1.5rem;font-weight:700;color:var(--text)">—</div>
      </div>
      <div style="padding:1.2rem;background:var(--bg);border-radius:var(--r-sm);text-align:center;border-top:3px solid var(--secondary)">
        <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.5rem">This Month</div>
        <div style="font-size:1.5rem;font-weight:700;color:var(--text)">—</div>
      </div>
      <div style="padding:1.2rem;background:var(--bg);border-radius:var(--r-sm);text-align:center;border-top:3px solid #22c55e">
        <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.5rem">This Quarter</div>
        <div style="font-size:1.5rem;font-weight:700;color:var(--text)" th:text="${approvedValue != null ? '₹' + approvedValue : '—'}">—</div>
      </div>
    </div>
  </div>

</section>
</html>
